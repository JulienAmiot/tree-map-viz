# --------------------------------------------------------------------------
# SonarQube scanner configuration for `tree-graph-viz` (В§17.53)
# --------------------------------------------------------------------------
#
# Read by `sonarqube-scanner` (npm package, see `package.json`) when
# `npm run sonar:scan` or `npm run sonar:gate` runs. The scanner CLI
# also picks up `SONAR_TOKEN` and `SONAR_HOST_URL` from the environment
# (loaded via dotenv-cli from `.env.sonar` вҖ” see the npm scripts).
#
# QUALITY GATE BOUND TO THIS PROJECT
# ----------------------------------
# The local Sonar server has a project-specific gate `TreeGraphViz` (NOT
# the default `Sonar way`) attached to project key `tree-graph-viz`. Its
# 9 conditions, ordered as the operator configured them and verified via
# `GET /api/qualitygates/show?name=TreeGraphViz` on 2026-05-03, are:
#
#   в”Ңв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ
#   в”Ӯ  # в”Ӯ Metric (FAIL when вҖҰ)                                         в”Ӯ Source     в”Ӯ
#   в”ңв”Җв”Җв”Җв”Җв”јв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”јв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Ө
#   в”Ӯ  1 в”Ӯ new_violations          > 0                                  в”Ӯ Sonar Way  в”Ӯ
#   в”Ӯ  2 в”Ӯ new_coverage            < 80   (% lines covered, new code)   в”Ӯ Sonar Way  в”Ӯ
#   в”Ӯ  3 в”Ӯ new_duplicated_lines_density        > 3   (%, new code)      в”Ӯ Sonar Way  в”Ӯ
#   в”Ӯ  4 в”Ӯ new_security_hotspots_reviewed      < 100 (%, new code)      в”Ӯ Sonar Way  в”Ӯ
#   в”Ӯ  5 в”Ӯ complexity              > 20   (cyclomatic, per file)        в”Ӯ custom     в”Ӯ
#   в”Ӯ  6 в”Ӯ cognitive_complexity    > 15   (per file)                    в”Ӯ custom     в”Ӯ
#   в”Ӯ  7 в”Ӯ software_quality_maintainability_rating  > 1  (=A)           в”Ӯ custom     в”Ӯ
#   в”Ӯ  8 в”Ӯ effort_to_reach_software_quality_maintainability_rating_a    в”Ӯ custom     в”Ӯ
#   в”Ӯ    в”Ӯ                          > 10  (minutes)                     в”Ӯ            в”Ӯ
#   в”Ӯ  9 в”Ӯ new_lines               > 100  (new lines per scan delta)    в”Ӯ custom     в”Ӯ
#   в””в”Җв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ
#
# Conditions 1вҖ“4 are the inherited Sonar-Way Clean-as-You-Code defaults.
# Conditions 5вҖ“9 are operator-added on top to enforce kiosk-codebase
# norms; condition 9 in particular operationalises the operator's
# "slice into small logical commits, PR often" directive вҖ” a feature
# branch that adds more than 100 lines of new code FAILS the gate. Plan
# every feature with that ceiling in mind: split into multiple branches
# rather than land one fat polish bundle.
#
# To inspect the live gate state at any time:
#   curl -u "$SONAR_TOKEN:" \
#     http://localhost:9000/api/qualitygates/show?name=TreeGraphViz
#   curl -u "$SONAR_TOKEN:" \
#     http://localhost:9000/api/qualitygates/project_status?projectKey=tree-graph-viz
#   curl -u "$SONAR_TOKEN:" \
#     http://localhost:9000/api/measures/component?component=tree-graph-viz&metricKeys=ncloc,coverage,new_lines,complexity,cognitive_complexity,violations,sqale_rating,reliability_rating
#
# To edit the gate, sign in to http://localhost:9000 as `admin`, go to
# Quality Gates вҶ’ TreeGraphViz вҶ’ Conditions. Changes take effect on the
# next scan.
# --------------------------------------------------------------------------

# Stable identifiers ---------------------------------------------------------
# `projectKey` is the Sonar-side ID (cannot contain spaces). Match the npm
# package name so the project is easy to spot in the Sonar UI.
sonar.projectKey=tree-graph-viz
sonar.projectName=Tree Graph Viz
# Read from package.json at scan time via the scanner's --define override
# in `npm run sonar:scan`; this is a default for ad-hoc runs.
sonar.projectVersion=0.0.1

# Source layout --------------------------------------------------------------
# `src/` holds the entire codebase (domain + application + adapters + tests).
# Sonar treats `sources` and `tests` differently in the rule engine вҖ” tests
# are analysed but excluded from the "duplicated lines / coverage / code
# smells on production code" metrics that drive the Quality Gate.
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=\
  src/test/unit/**/*.ts,\
  src/test/unit/**/*.tsx,\
  src/test/e2e/steps/**/*.ts,\
  src/**/*.test.ts,\
  src/**/*.test.tsx
sonar.exclusions=\
  src/test/e2e/.features-gen/**,\
  src/test/e2e/features/**,\
  examples/**,\
  dist/**,\
  coverage/**,\
  playwright-report/**,\
  test-results/**,\
  node_modules/**,\
  bin/**

# Encoding + JS/TS scanner specifics ----------------------------------------
sonar.sourceEncoding=UTF-8
# Tell the SonarJS scanner where the TypeScript compiler config lives so it
# can resolve imports + types accurately (otherwise it falls back to a
# permissive parser and misses TS-specific rules).
sonar.typescript.tsconfigPath=tsconfig.json

# Coverage ------------------------------------------------------------------
# Vitest writes lcov to `coverage/lcov.info` (see `vite.config.ts` test
# block). The scanner reads this into Sonar's coverage metric, which the
# default "Sonar Way" Quality Gate enforces at 80% on NEW code.
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Coverage exclusions: don't count test files, the composition root, or
# generated/wire-format type modules against coverage вҖ” they're either
# already 100% by construction (test code testing itself) or impractical
# to unit-test in isolation (composition roots wire dependencies, the
# Vite entry point boots the app).
sonar.coverage.exclusions=\
  src/test/**/*,\
  src/**/*.test.ts,\
  src/**/*.test.tsx,\
  src/main.ts,\
  src/vite-env.d.ts

# Branch / PR analysis ------------------------------------------------------
# Community Edition supports master-branch analysis only; branch + PR
# analysis live in Developer Edition. Our gate runs against `master` after
# every feature branch merges in, plus an opt-in pre-push gate (see
# `.husky/pre-push`) that scans whatever's on HEAD locally.
sonar.scm.provider=git

# Quality Gate wait ---------------------------------------------------------
# When set, the scanner blocks until Sonar publishes the gate result and
# exits non-zero on FAILED. The npm `sonar:gate` script enables this; the
# plain `sonar:scan` script does not (so `scan` is fire-and-forget for
# inspection runs that shouldn't fail CI on a cosmetic regression).
# Default OFF here вҖ” scripts pass `-Dsonar.qualitygate.wait=true` when
# they need the gate.
sonar.qualitygate.wait=false
