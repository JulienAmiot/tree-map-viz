# Conditions 1вҖ“4 are the inherited Sonar-Way Clean-as-You-Code defaults.
# Conditions 5вҖ“7 are operator-added on top to enforce kiosk-codebase
# norms; condition 7 in particular operationalises the operator's
# "slice into small logical commits, PR often" directive вҖ” a feature
# branch that adds more than 300 lines of new code FAILS the gate. Plan
# every feature with that ceiling in mind: split into multiple branches
# rather than land one fat polish bundle. The threshold was tightened
# from 100 вҶ’ 300 in the live gate after В§17.53; the value here is the
# current truth (verified against the Sonar API on В§17.59's resume
# sanity check). To re-verify at any time:
#
#   curl -u "$SONAR_TOKEN:" \
#     'http://localhost:9000/api/qualitygates/show?name=TreeMapViz'
