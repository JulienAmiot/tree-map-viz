# leak window is "since the last VERSION event." Bump this number when a
# meaningful boundary lands ÔÇö e.g. a feature branch merging a substantial
# bundle. The next scan after the bump creates a new VERSION event that
# subsequent scans treat as the baseline, resetting `new_lines` / `new_*`
# metrics to zero for unchanged files.
