# from `tree-graph-viz` in §17.63 — see SPEC §17.63 for the rename event).
# --------------------------------------------------------------------------
#
# Read by `sonarqube-scanner` (npm package, see `package.json`) when
# `npm run sonar:scan` or `npm run sonar:gate` runs. The scanner CLI
# also picks up `SONAR_TOKEN` and `SONAR_HOST_URL` from the environment
# (loaded via dotenv-cli from `.env.sonar` — see the npm scripts).
#
# QUALITY GATE BOUND TO THIS PROJECT
# ----------------------------------
# The local Sonar server has a project-specific gate `TreeMapViz` (NOT
# the default `Sonar way`) attached to project key `tree-map-viz`. Its
# 7 conditions, verified via `GET /api/qualitygates/show?name=TreeMapViz`
# on 2026-05-03 (post-fix; see "GATE-CONDITION FIX" note below), are
# (gate was renamed from `TreeGraphViz` alongside the §17.63 project key
# rename — same conditions, same thresholds, just the display name flips):
#
#   ┌────┬──────────────────────────────────────────────────────────────┬────────────┐
#   │  # │ Metric (FAIL when …)                                         │ Source     │
#   ├────┼──────────────────────────────────────────────────────────────┼────────────┤
#   │  1 │ new_violations          > 0                                  │ Sonar Way  │
#   │  2 │ new_coverage            < 80   (% lines covered, new code)   │ Sonar Way  │
#   │  3 │ new_duplicated_lines_density        > 3   (%, new code)      │ Sonar Way  │
#   │  4 │ new_security_hotspots_reviewed      < 100 (%, new code)      │ Sonar Way  │
#   │  5 │ software_quality_maintainability_rating  > 1  (=A)           │ custom     │
#   │  6 │ effort_to_reach_software_quality_maintainability_rating_a    │ custom     │
#   │    │                          > 10  (minutes)                     │            │
#   │  7 │ new_lines               > 300  (new lines per scan delta)    │ custom     │
#   └────┴──────────────────────────────────────────────────────────────┴────────────┘
#
# Conditions 1–4 are the inherited Sonar-Way Clean-as-You-Code defaults.
# Conditions 5–7 are operator-added on top to enforce kiosk-codebase
# norms; condition 7 in particular operationalises the operator's
# "slice into small logical commits, PR often" directive — a feature
# branch that adds more than 300 lines of new code FAILS the gate. Plan
# every feature with that ceiling in mind: split into multiple branches
# rather than land one fat polish bundle. The threshold was tightened
# from 100 → 300 in the live gate after §17.53; the value here is the
# current truth (verified against the Sonar API on §17.59's resume
# sanity check). To re-verify at any time:
#
#   curl -u "$SONAR_TOKEN:" \
#     'http://localhost:9000/api/qualitygates/show?name=TreeMapViz'
#
# GATE-CONDITION FIX (2026-05-03 ~18:30 UTC+2)
# --------------------------------------------
# The first end-to-end gate run on the §17.45 → §17.53 polish bundle
# revealed two of the original 9 conditions were misconfigured against
# Sonar 25's metric model:
#   - `complexity > 20`           (project-total cyclomatic complexity ≤ 20)
#   - `cognitive_complexity > 15` (project-total cognitive complexity ≤ 15)
# In Sonar 25, both metrics WITHOUT a `new_` prefix and WITHOUT a
# `_per_file` / `_per_function` suffix are project-total aggregates —
# meaning the thresholds 20 / 15 are unsatisfiable for any non-trivial
# project (this codebase reports 1 350 / 743 respectively, and even a
# few-hundred-line MVP would clear them). Sonar 25 retired the
# `file_complexity` / `function_complexity` averages, so there's no
# direct per-file substitute as a gate condition. The intended
# enforcement (per-function complexity caps) is already covered by the
# Sonar Way RULE engine — these per-function rules ship active in the
# `Sonar way` TS profile bound to this project:
#   - `typescript:S1541` — cyclomatic complexity per function ≤ 10  (CRITICAL)
#   - `typescript:S3776` — cognitive complexity per function ≤ 15  (CRITICAL)
#   - `typescript:S138`  — lines of code per function           ≤ 200 (MAJOR)
#   - `typescript:S134`  — nesting depth of if/for/while/...    ≤ 3   (CRITICAL)
#   - `typescript:S107`  — function parameter count             ≤ 7   (MAJOR)
# Each fires per-function when its threshold is crossed and contributes to
# `code_smells` / `new_violations`, which IS gated by condition 1
# (`new_violations > 0`). The two misconfigured conditions were therefore
# removed via the API (`POST /api/qualitygates/delete_condition`); the
# per-function enforcement is preserved through condition 1 + the rules
# engine. To tighten the per-function thresholds further, COPY the built-in
# `Sonar way` TS profile (built-ins are read-only — cannot tune in place),
# edit the rule's parameter on the copy, and bind the copy to the project:
#   POST /api/qualityprofiles/copy?fromKey=ts-sonar-way&toName=TreeMapViz%20TS
#   POST /api/qualityprofiles/activate_rule?key=ts-treemapviz-ts&rule=typescript:S1541&params=Threshold=5&severity=CRITICAL
#   POST /api/qualityprofiles/add_project?language=ts&qualityProfile=TreeMapViz%20TS&project=tree-map-viz
# (Defaults are battle-tested over Sonar's research catalogue; tighten only
# when a specific function slips past and you want to prevent the next.)
#
# To inspect the live gate state at any time:
#   curl -u "$SONAR_TOKEN:" \
#     http://localhost:9000/api/qualitygates/show?name=TreeMapViz
#   curl -u "$SONAR_TOKEN:" \
#     http://localhost:9000/api/qualitygates/project_status?projectKey=tree-map-viz
#   curl -u "$SONAR_TOKEN:" \
#     http://localhost:9000/api/measures/component?component=tree-map-viz&metricKeys=ncloc,coverage,new_lines,complexity,cognitive_complexity,violations,sqale_rating,reliability_rating
#
# To edit the gate, sign in to http://localhost:9000 as `admin`, go to
# Quality Gates → TreeMapViz → Conditions. Changes take effect on the
# next scan.
# --------------------------------------------------------------------------

# Stable identifiers ---------------------------------------------------------
# `projectKey` is the Sonar-side ID (cannot contain spaces). Match the npm
# package name so the project is easy to spot in the Sonar UI. Renamed in
# §17.63 from `tree-graph-viz` / `Tree Graph Viz`; on the operator side this
# rename rides on `POST /api/projects/update_key?from=tree-graph-viz&to=
# tree-map-viz` against the live Sonar server BEFORE the next scan, so the
# project's history (scans, leak periods, the 0.0.1 / 0.0.2 / 0.0.3 VERSION
# events) carries over onto the renamed key. See SPEC §17.63.
sonar.projectKey=tree-map-viz
sonar.projectName=Tree Map Viz
