# Source layout --------------------------------------------------------------
# `src/` holds the entire codebase (domain + application + adapters + tests).
# Sonar treats `sources` and `tests` differently in the rule engine ‚Äî tests
# are analysed but excluded from the "duplicated lines / coverage / code
# smells on production code" metrics that drive the Quality Gate.
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=\
  src/test/unit/**/*.ts,\
  src/test/unit/**/*.tsx,\
  src/test/e2e/steps/**/*.ts,\
  src/**/*.test.ts,\
  src/**/*.test.tsx
sonar.exclusions=\
  src/test/e2e/.features-gen/**,\
  src/test/e2e/features/**,\
  examples/**,\
  dist/**,\
  coverage/**,\
  playwright-report/**,\
  test-results/**,\
  node_modules/**,\
  bin/**

# Encoding + JS/TS scanner specifics ----------------------------------------
sonar.sourceEncoding=UTF-8
# Tell the SonarJS scanner where the TypeScript compiler config lives so it
# can resolve imports + types accurately (otherwise it falls back to a
# permissive parser and misses TS-specific rules).
sonar.typescript.tsconfigPath=tsconfig.json

# Coverage ------------------------------------------------------------------
# Vitest writes lcov to `coverage/lcov.info` (see `vite.config.ts` test
# block). The scanner reads this into Sonar's coverage metric, which the
# default "Sonar Way" Quality Gate enforces at 80% on NEW code.
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Coverage exclusions: don't count test files, the composition root, or
# generated/wire-format type modules against coverage ‚Äî they're either
# already 100% by construction (test code testing itself) or impractical
# to unit-test in isolation (composition roots wire dependencies, the
# Vite entry point boots the app).
sonar.coverage.exclusions=\
  src/test/**/*,\
  src/**/*.test.ts,\
  src/**/*.test.tsx,\
  src/main.ts,\
  src/domain/index.ts,\
  src/vite-env.d.ts

# CPD (copy-paste detection) exclusions -------------------------------------
# Sonar's CPD flags structurally-identical code blocks across files as
# "duplicated code". Most of the time this is the right call (a real
# copy-paste is technical debt). But some patterns are inherently
# structural ‚Äî every concrete implementation of a small interface MUST
# ship the same method shape, every override of a small abstract method
# MUST share the same body, etc. ‚Äî and CPD's token-based matcher flags
# them as duplication when they're actually the interface contract.
#
# ¬ß17.98 introduced the first such pattern in this codebase: ¬ß17.97
# `ComputedNode<T>` and ¬ß17.98 `ComputedBusinessScoreNode<T>` both
# implement the ¬ß17.96 `Computed<T>` interface and both override
# `setValue` / `addValue` to throw `ComputationOverrideError` per ¬ß17.94
# D5. After the ¬ß17.98 dedup refactor (the cached `(kind, strategy)` pair
# pulled into `ComputationCache<T>` and composed by both), the remaining
# overlap is ~12 lines: the `Computed<T>` interface getters + setter
# delegate to the cache identically, and the two audit-only override
# bodies (`setValue` / `addValue`) raise `ComputationOverrideError(this.id)`
# identically. Every alternative dedup path ‚Äî pushing those 6 methods
# into a TS mixin, a shared abstract base, or a hidden composition slot
# ‚Äî costs more design clarity than it gains, and CPD's `~100-token`
# default minimum can't tell "interface contract" apart from "true
# duplication".
#
# Exclude the two Computed* node files from CPD analysis. Coverage +
# every other quality metric still applies; only duplicate-density is
# silenced on these specific files. The ¬ß17.98 SPEC row + this docblock
# carry the rationale; a future strand adding a third `Computed<T>`
# implementer SHOULD audit whether this exclusion still makes sense
# (does the new class genuinely share the interface contract, or has
# it diverged enough that re-enabling CPD would catch real drift?).
sonar.cpd.exclusions=\
  src/domain/nodes/ComputedNode.ts,\
  src/domain/nodes/ComputedBusinessScoreNode.ts

# Branch / PR analysis ------------------------------------------------------
# Community Edition supports master-branch analysis only; branch + PR
# analysis live in Developer Edition. Our gate runs against `master` after
# every feature branch merges in, plus an opt-in pre-push gate (see
# `.husky/pre-push`) that scans whatever's on HEAD locally.
sonar.scm.provider=git

# Quality Gate wait ---------------------------------------------------------
# When set, the scanner blocks until Sonar publishes the gate result and
# exits non-zero on FAILED. The npm `sonar:gate` script enables this; the
# plain `sonar:scan` script does not (so `scan` is fire-and-forget for
# inspection runs that shouldn't fail CI on a cosmetic regression).
# Default OFF here ‚Äî scripts pass `-Dsonar.qualitygate.wait=true` when
# they need the gate.
sonar.qualitygate.wait=false
