# Conditions 1‚Äì4 are the inherited Sonar-Way Clean-as-You-Code defaults.
# Conditions 5‚Äì7 are operator-added on top to enforce kiosk-codebase
# norms; condition 7 in particular operationalises the operator's
# "slice into small logical commits, PR often" directive ‚Äî a feature
# branch that adds more than 300 lines of new code FAILS the gate. Plan
# every feature with that ceiling in mind: split into multiple branches
# rather than land one fat polish bundle. The threshold was tightened
# from 100 ‚Üí 300 in the live gate after ¬ß17.53; the value here is the
# current truth (verified against the Sonar API on ¬ß17.59's resume
# sanity check). To re-verify at any time:
#
#   curl -u "$SONAR_TOKEN:" \
#     'http://localhost:9000/api/qualitygates/show?name=TreeMapViz'
#
# GATE-CONDITION FIX (2026-05-03 ~18:30 UTC+2)
# --------------------------------------------
# The first end-to-end gate run on the ¬ß17.45 ‚Üí ¬ß17.53 polish bundle
# revealed two of the original 9 conditions were misconfigured against
# Sonar 25's metric model:
#   - `complexity > 20`           (project-total cyclomatic complexity ‚â§ 20)
#   - `cognitive_complexity > 15` (project-total cognitive complexity ‚â§ 15)
# In Sonar 25, both metrics WITHOUT a `new_` prefix and WITHOUT a
# `_per_file` / `_per_function` suffix are project-total aggregates ‚Äî
# meaning the thresholds 20 / 15 are unsatisfiable for any non-trivial
# project (this codebase reports 1 350 / 743 respectively, and even a
# few-hundred-line MVP would clear them). Sonar 25 retired the
# `file_complexity` / `function_complexity` averages, so there's no
# direct per-file substitute as a gate condition. The intended
# enforcement (per-function complexity caps) is already covered by the
# Sonar Way RULE engine ‚Äî these per-function rules ship active in the
# `Sonar way` TS profile bound to this project:
#   - `typescript:S1541` ‚Äî cyclomatic complexity per function ‚â§ 10  (CRITICAL)
#   - `typescript:S3776` ‚Äî cognitive complexity per function ‚â§ 15  (CRITICAL)
#   - `typescript:S138`  ‚Äî lines of code per function           ‚â§ 200 (MAJOR)
#   - `typescript:S134`  ‚Äî nesting depth of if/for/while/...    ‚â§ 3   (CRITICAL)
#   - `typescript:S107`  ‚Äî function parameter count             ‚â§ 7   (MAJOR)
# Each fires per-function when its threshold is crossed and contributes to
# `code_smells` / `new_violations`, which IS gated by condition 1
# (`new_violations > 0`). The two misconfigured conditions were therefore
# removed via the API (`POST /api/qualitygates/delete_condition`); the
# per-function enforcement is preserved through condition 1 + the rules
# engine. To tighten the per-function thresholds further, COPY the built-in
# `Sonar way` TS profile (built-ins are read-only ‚Äî cannot tune in place),
# edit the rule's parameter on the copy, and bind the copy to the project:
#   POST /api/qualityprofiles/copy?fromKey=ts-sonar-way&toName=TreeMapViz%20TS
#   POST /api/qualityprofiles/activate_rule?key=ts-treemapviz-ts&rule=typescript:S1541&params=Threshold=5&severity=CRITICAL
#   POST /api/qualityprofiles/add_project?language=ts&qualityProfile=TreeMapViz%20TS&project=tree-map-viz
# (Defaults are battle-tested over Sonar's research catalogue; tighten only
# when a specific function slips past and you want to prevent the next.)
#
# To inspect the live gate state at any time:
#   curl -u "$SONAR_TOKEN:" \
#     http://localhost:9000/api/qualitygates/show?name=TreeMapViz
#   curl -u "$SONAR_TOKEN:" \
#     http://localhost:9000/api/qualitygates/project_status?projectKey=tree-map-viz
#   curl -u "$SONAR_TOKEN:" \
#     http://localhost:9000/api/measures/component?component=tree-map-viz&metricKeys=ncloc,coverage,new_lines,complexity,cognitive_complexity,violations,sqale_rating,reliability_rating
#
# To edit the gate, sign in to http://localhost:9000 as `admin`, go to
# Quality Gates ‚Üí TreeMapViz ‚Üí Conditions. Changes take effect on the
# next scan.
