# Source layout --------------------------------------------------------------
# `src/` holds the entire codebase (domain + application + adapters + tests).
# Sonar treats `sources` and `tests` differently in the rule engine вҖ” tests
# are analysed but excluded from the "duplicated lines / coverage / code
# smells on production code" metrics that drive the Quality Gate.
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=\
  src/test/unit/**/*.ts,\
  src/test/unit/**/*.tsx,\
  src/test/e2e/steps/**/*.ts,\
  src/**/*.test.ts,\
  src/**/*.test.tsx
sonar.exclusions=\
  src/test/e2e/.features-gen/**,\
  src/test/e2e/features/**,\
  examples/**,\
  dist/**,\
  coverage/**,\
  playwright-report/**,\
  test-results/**,\
  node_modules/**,\
  bin/**

# Encoding + JS/TS scanner specifics ----------------------------------------
sonar.sourceEncoding=UTF-8
# Tell the SonarJS scanner where the TypeScript compiler config lives so it
# can resolve imports + types accurately (otherwise it falls back to a
# permissive parser and misses TS-specific rules).
sonar.typescript.tsconfigPath=tsconfig.json

# Coverage ------------------------------------------------------------------
# Vitest writes lcov to `coverage/lcov.info` (see `vite.config.ts` test
# block). The scanner reads this into Sonar's coverage metric, which the
# default "Sonar Way" Quality Gate enforces at 80% on NEW code.
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Coverage exclusions: don't count test files, the composition root, or
# generated/wire-format type modules against coverage вҖ” they're either
# already 100% by construction (test code testing itself) or impractical
# to unit-test in isolation (composition roots wire dependencies, the
# Vite entry point boots the app).
sonar.coverage.exclusions=\
  src/test/**/*,\
  src/**/*.test.ts,\
  src/**/*.test.tsx,\
  src/main.ts,\
  src/vite-env.d.ts

# Branch / PR analysis ------------------------------------------------------
# Community Edition supports master-branch analysis only; branch + PR
# analysis live in Developer Edition. Our gate runs against `master` after
# every feature branch merges in, plus an opt-in pre-push gate (see
# `.husky/pre-push`) that scans whatever's on HEAD locally.
sonar.scm.provider=git

# Quality Gate wait ---------------------------------------------------------
# When set, the scanner blocks until Sonar publishes the gate result and
# exits non-zero on FAILED. The npm `sonar:gate` script enables this; the
# plain `sonar:scan` script does not (so `scan` is fire-and-forget for
# inspection runs that shouldn't fail CI on a cosmetic regression).
# Default OFF here вҖ” scripts pass `-Dsonar.qualitygate.wait=true` when
# they need the gate.
sonar.qualitygate.wait=false
