#            running. The published 0.0.9 measurement remained
#            at `new_lines = 0` (Sonar's per-line "newness" is
#            sticky across analysis deletions) but the gate
#            condition was satisfied. **From ¬ß17.73 onward, the
#            procedure is**: (a) bump `sonar.projectVersion`
#            ALWAYS ‚Äî every feature strand declares a NEW value;
#            (b) commit the strand's content FIRST, then run
#            `npm run sonar:gate`. Running the gate on uncommitted
#            content is now a documented anti-pattern.
#   - 0.1.0: ¬ß17.73 boundary (2026-05-10). Every-strand bump per
#            the ¬ß17.72 corrected rule. ¬ß17.73 introduces
#            `HistorizableValueNode<T>`, the v4 abstract that
#            composes Clock (the ¬ß17.57 port, injected at
#            construction per the v4 diagram's
#            `HistorizableValueNode<T> ..> Clock` arrow) and a
#            `TimestampedValue<T>[]` history slot, exposing the
#            entries / getValue / setValue / addValue / removeValue
#            surface from the v4 class diagram and raising
#            EmptyHistoryError + TimestampNotFoundError per the
#            diagram's error edges. First real consumer of the
#            v4 foundation chain (Clock + Timestamp + Direction
#            via Timestamp.compare) ‚Äî after ¬ß17.72 wired the top
#            two layers (Node + ValueNode<T>), ¬ß17.73 brings the
#            history-aware abstract online. Strictly additive ‚Äî
#            no v3 file touched, both classes tree-shaken from
#            the bundle until ¬ß17.74 wires TextNode below it.
#   - 0.1.1: ¬ß17.74 boundary (2026-05-10). Every-strand bump per
#            the ¬ß17.72 corrected rule (no exceptions). ¬ß17.74
#            introduces `TextNodeV4`, the first CONCRETE subclass
#            of `HistorizableValueNode<string>` (the v4 successor
#            to v3's `TextNode`). Two structural traits per the
#            v4 class diagram: (a) trivial getValue() ‚Äî inherited
#            verbatim from HistorizableValueNode<string>'s
#            most-recent-entry tail-read (no override); (b) a
#            polymorphic `getDescription()` override that returns
#            `this.getValue()` per SPEC ¬ß17.15 ("the rendered
#            'description' of a text node IS the value; the
#            underlying description field stays empty"). The
#            class name is temporarily suffixed `V4` because v3's
#            `TextNode` already owns the `TextNode` filename + class
#            name and the strict-additive precedent from ¬ß17.72 /
#            ¬ß17.73 forbids touching v3 files. Suffix drops at
#            the v3-retirement strand (a single rename + import-
#            updates change). Strictly additive otherwise ‚Äî no v3
#            file touched, the class tree-shaken from the bundle
#            until a future production-wiring strand consumes it.
#   - 0.1.2: ¬ß17.75 boundary (2026-05-10). Every-strand bump per
#            the ¬ß17.72 corrected rule. ¬ß17.75 introduces
#            `RangedValueNode<T>`, the v4 abstract sibling of
#            `HistorizableValueNode<T>` (actually its DIRECT
#            descendant per the diagram's `HistorizableValueNode~T~
#            <|-- RangedValueNode~T~` arrow ‚Äî RangedValueNode IS
#            history-aware, just additionally range-bounded).
#            Composes `+Range<T> range` (the ¬ß17.71 hierarchy) and
#            overrides `addValue(Timestamp t, T v)` to propagate
#            through `range.requireValue(v)` BEFORE delegating to
#            the inherited tail-append: StrictRange-bound nodes
#            throw `OutOfRangeError` on out-of-range writes,
#            LenientRange-bound nodes silently accept. The
#            inherited `setValue(v)` indirectly inherits the same
#            check because it calls `this.addValue(clock.now(), v)`
#            which now goes through the overridden form. No v3
#            namesake -> no V4 suffix needed; ships under its
#            v4-final name `RangedValueNode<T>`. Strictly additive
#            ‚Äî no v3 file touched, the class tree-shaken from the
#            bundle until ¬ß17.76 / ¬ß17.77 wire concrete descendants
#            (BusinessScoreNode<T> + StrictRangeNode<T>) below it.
#   - 0.1.3: ¬ß17.76 boundary (2026-05-10). Every-strand bump per
#            the ¬ß17.72 corrected rule. ¬ß17.76 introduces TWO
#            artefacts: (a) `ObjectiveV4<T>`, the v4 redesign of
#            v3's `Objective<T>` value object ‚Äî different shape,
#            so the v4 ships under the V4 suffix until v3 retires.
#            v3 Objective<T> has 3 fields (initialValue, targetValue,
#            targetDate); v4 ObjectiveV4<T> has 2 fields (at: Timestamp,
#            value: T) per the v4 class diagram's `<<value>> class
#            Objective~T~ { +Timestamp at; +T value; }`. The v4
#            shape is structurally identical to TimestampedValue<T>
#            but semantically distinct (TimestampedValue is a
#            history-entry; Objective is a goal-point). The
#            "initialValue" v3 carried is redundant in v4 since the
#            history's first entry IS the initial value. (b)
#            `BusinessScoreNode<T>`, the v4 concrete subclass of
#            RangedValueNode<T> binding LenientRange<T> (advisory
#            range ‚Äî out-of-range writes silently accepted, matching
#            v3 BusinessScoreCardNode's semantics) and composing the
#            new ObjectiveV4<T> per the diagram's `+Objective<T>
#            objective` slot. NO V4 suffix on BusinessScoreNode
#            because the v3 namesake is `BusinessScoreCardNode`
#            (with `Card` infix) ‚Äî different name ‚Üí no collision ‚Üí
#            ships under v4-final name directly. Strictly additive
#            otherwise ‚Äî no v3 file touched, both classes tree-shaken
#            from the bundle until a future production-wiring strand
#            consumes them.
sonar.projectVersion=0.1.3

# Source layout --------------------------------------------------------------
# `src/` holds the entire codebase (domain + application + adapters + tests).
# Sonar treats `sources` and `tests` differently in the rule engine ‚Äî tests
# are analysed but excluded from the "duplicated lines / coverage / code
# smells on production code" metrics that drive the Quality Gate.
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=\
  src/test/unit/**/*.ts,\
  src/test/unit/**/*.tsx,\
  src/test/e2e/steps/**/*.ts,\
  src/**/*.test.ts,\
  src/**/*.test.tsx
sonar.exclusions=\
  src/test/e2e/.features-gen/**,\
  src/test/e2e/features/**,\
  examples/**,\
  dist/**,\
  coverage/**,\
  playwright-report/**,\
  test-results/**,\
  node_modules/**,\
  bin/**

# Encoding + JS/TS scanner specifics ----------------------------------------
sonar.sourceEncoding=UTF-8
# Tell the SonarJS scanner where the TypeScript compiler config lives so it
# can resolve imports + types accurately (otherwise it falls back to a
# permissive parser and misses TS-specific rules).
sonar.typescript.tsconfigPath=tsconfig.json

# Coverage ------------------------------------------------------------------
# Vitest writes lcov to `coverage/lcov.info` (see `vite.config.ts` test
# block). The scanner reads this into Sonar's coverage metric, which the
# default "Sonar Way" Quality Gate enforces at 80% on NEW code.
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Coverage exclusions: don't count test files, the composition root, or
# generated/wire-format type modules against coverage ‚Äî they're either
# already 100% by construction (test code testing itself) or impractical
# to unit-test in isolation (composition roots wire dependencies, the
# Vite entry point boots the app).
sonar.coverage.exclusions=\
  src/test/**/*,\
  src/**/*.test.ts,\
  src/**/*.test.tsx,\
  src/main.ts,\
  src/vite-env.d.ts

# Branch / PR analysis ------------------------------------------------------
# Community Edition supports master-branch analysis only; branch + PR
# analysis live in Developer Edition. Our gate runs against `master` after
# every feature branch merges in, plus an opt-in pre-push gate (see
# `.husky/pre-push`) that scans whatever's on HEAD locally.
sonar.scm.provider=git

# Quality Gate wait ---------------------------------------------------------
# When set, the scanner blocks until Sonar publishes the gate result and
# exits non-zero on FAILED. The npm `sonar:gate` script enables this; the
# plain `sonar:scan` script does not (so `scan` is fire-and-forget for
# inspection runs that shouldn't fail CI on a cosmetic regression).
# Default OFF here ‚Äî scripts pass `-Dsonar.qualitygate.wait=true` when
# they need the gate.
sonar.qualitygate.wait=false
