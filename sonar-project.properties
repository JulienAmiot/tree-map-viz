# Source layout --------------------------------------------------------------
# `src/` holds the entire codebase (domain + application + adapters + tests).
# Sonar treats `sources` and `tests` differently in the rule engine ΓÇö tests
# are analysed but excluded from the "duplicated lines / coverage / code
# smells on production code" metrics that drive the Quality Gate.
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=\
  src/test/unit/**/*.ts,\
  src/test/unit/**/*.tsx,\
  src/test/e2e/steps/**/*.ts,\
  src/**/*.test.ts,\
  src/**/*.test.tsx
sonar.exclusions=\
  src/test/e2e/.features-gen/**,\
  src/test/e2e/features/**,\
  examples/**,\
  dist/**,\
  coverage/**,\
  playwright-report/**,\
  test-results/**,\
  node_modules/**,\
  bin/**

# Encoding + JS/TS scanner specifics ----------------------------------------
sonar.sourceEncoding=UTF-8
# Tell the SonarJS scanner where the TypeScript compiler config lives so it
# can resolve imports + types accurately (otherwise it falls back to a
# permissive parser and misses TS-specific rules).
sonar.typescript.tsconfigPath=tsconfig.json

# Coverage ------------------------------------------------------------------
# Vitest writes lcov to `coverage/lcov.info` (see `vite.config.ts` test
# block). The scanner reads this into Sonar's coverage metric, which the
# default "Sonar Way" Quality Gate enforces at 80% on NEW code.
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Coverage exclusions: don't count test files, the composition root, or
# generated/wire-format type modules against coverage ΓÇö they're either
# already 100% by construction (test code testing itself) or impractical
# to unit-test in isolation (composition roots wire dependencies, the
# Vite entry point boots the app).
sonar.coverage.exclusions=\
  src/test/**/*,\
  src/**/*.test.ts,\
  src/**/*.test.tsx,\
  src/main.ts,\
  src/domain/index.ts,\
  src/vite-env.d.ts

# CPD (copy-paste detection) exclusions -------------------------------------
# Sonar's CPD flags structurally-identical code blocks across files as
# "duplicated code". Most of the time this is the right call (a real
# copy-paste is technical debt). But some patterns are inherently
# structural ΓÇö every concrete implementation of a small interface MUST
# ship the same method shape, every override of a small abstract method
# MUST share the same body, etc. ΓÇö and CPD's token-based matcher flags
# them as duplication when they're actually the interface contract.
#
# ┬Ú17.98 introduced the first such pattern in this codebase: ┬Ú17.97
# `ComputedNode<T>` and ┬Ú17.98 `ComputedBusinessScoreNode<T>` both
# implement the ┬Ú17.96 `Computed<T>` interface and both override
# `setValue` / `addValue` to throw `ComputationOverrideError` per ┬Ú17.94
# D5. After the ┬Ú17.98 dedup refactor (the cached `(kind, strategy)` pair
# pulled into `ComputationCache<T>` and composed by both), the remaining
# overlap is ~12 lines: the `Computed<T>` interface getters + setter
# delegate to the cache identically, and the two audit-only override
# bodies (`setValue` / `addValue`) raise `ComputationOverrideError(this.id)`
# identically. Every alternative dedup path ΓÇö pushing those 6 methods
# into a TS mixin, a shared abstract base, or a hidden composition slot
# ΓÇö costs more design clarity than it gains, and CPD's `~100-token`
# default minimum can't tell "interface contract" apart from "true
# duplication".
#
# Exclude the two Computed* node files from CPD analysis. Coverage +
# every other quality metric still applies; only duplicate-density is
# silenced on these specific files. The ┬Ú17.98 SPEC row + this docblock
# carry the rationale; a future strand adding a third `Computed<T>`
# implementer SHOULD audit whether this exclusion still makes sense
# (does the new class genuinely share the interface contract, or has
# it diverged enough that re-enabling CPD would catch real drift?).
#
# ┬Ú17.124 extends the exclusion to the matching UI adapter:
# `src/adapters/ui/organisms/ComputedNode/ComputedCards.ts` houses two
# (path updated by ┬Ú17.128 R3c; original ┬Ú17.124 commit referenced
# `src/adapters/ui/views/ComputedNode/ComputedCards.ts`)
# Lit `@customElement` classes (`<computed-card>` +
# `<computed-business-score-card>`) that mirror the two domain Computed*
# types. The ┬Ú17.124 strand pulled every duplicable render helper into
# free functions (`renderComputedTitleSlot`, `renderInlineTitlePrefix`,
# `renderTitleWithBadge`, `dispatchComputationKindChange`), but the
# per-class scaffold that REMAINS ΓÇö `@property` declarations, the
# `static readonly styles` array, the `titleEditor` field init, the
# `getInlineTitleEditTarget` method, the `dispatchKindChange` arrow
# field, the `render` entry ΓÇö is the Lit element contract for a
# Computed* viewmodel, and two viewmodels in lockstep force two
# near-identical class bodies. Pre-┬Ú17.124 the file ran without
# tripping CPD's ~100-token minimum because ┬Ú17.116-followup-3 had
# already pulled most render helpers out; ┬Ú17.124 added back a
# titleEditor + getInlineTitleEditTarget per class which pushed the
# residual scaffold above the threshold. Same rationale as the domain
# pair: pushing the residue into a TS mixin / abstract base / hidden
# composition slot costs more design clarity than it gains.
#
# ┬Ú17.136 S6 extends the exclusion to the TextNode pair of per-views:
# `src/adapters/ui/organisms/TextNode/TextNodeAsParent.ts` and
# `src/adapters/ui/organisms/TextNode/TextNodeAsChild.ts`. After the
# ┬Ú17.136 S5 + S6 migrations both per-views wrap their render output
# in the shared `<card-frame>` molecule, and the resulting slot-routing
# scaffold (icons ΓåÆ disabled indicator/switch, title ΓåÆ h1/h2 with
# `slot="title"`, subtitle ΓåÆ empty placeholder, body ΓåÆ `.value-area`
# wrapping the ┬Ú17.27 markdown `.md-body`, footer-right ΓåÆ `<time
# class="timestamp">`) plus the shared imports + `tileLayoutStyles +
# textBodyStyles + disabledToggleStyles` static-styles preamble plus
# the per-view `.timestamp { position: static; bottom: auto; right:
# auto }` override land at ~40 lines of intentional structural overlap
# between the two roles. This is the ┬Ú17.136 card-frame **contract**,
# not accidental drift ΓÇö the molecule's whole point is that every
# kind/role reads as the same template with kind-specific bodies. CPD
# can't tell "intentional contract" apart from "true duplication" on
# raw line-tokens, and the same dedup costs (TS mixin / abstract base
# / hidden composition slot) outweigh the design clarity gain here
# just like they do on the Computed* pair. Strands S7-S12 will add
# the Workflow/Picture/URL pairs to this list as they migrate; S13's
# cutover (legacy strip retirement) may shrink the residual overlap
# enough to re-enable CPD on some pairs.
sonar.cpd.exclusions=\
  src/domain/nodes/ComputedNode.ts,\
  src/domain/nodes/ComputedBusinessScoreNode.ts,\
  src/adapters/ui/organisms/ComputedNode/ComputedCards.ts,\
  src/adapters/ui/organisms/TextNode/TextNodeAsParent.ts,\
  src/adapters/ui/organisms/TextNode/TextNodeAsChild.ts,\
  src/adapters/ui/organisms/WorkflowNode/WorkflowNodeAsParent.ts,\
  src/adapters/ui/organisms/WorkflowNode/WorkflowNodeAsChild.ts,\
  src/adapters/ui/organisms/PictureNode/PictureNodeAsParent.ts,\
  src/adapters/ui/organisms/PictureNode/PictureNodeAsChild.ts,\
  src/adapters/ui/organisms/URLNode/URLNodeAsParent.ts,\
  src/adapters/ui/organisms/URLNode/URLNodeAsChild.ts

# Branch / PR analysis ------------------------------------------------------
# Community Edition supports master-branch analysis only; branch + PR
# analysis live in Developer Edition. Our gate runs against `master` after
# every feature branch merges in, plus an opt-in pre-push gate (see
# `.husky/pre-push`) that scans whatever's on HEAD locally.
sonar.scm.provider=git

# Quality Gate wait ---------------------------------------------------------
# When set, the scanner blocks until Sonar publishes the gate result and
# exits non-zero on FAILED. The npm `sonar:gate` script enables this; the
# plain `sonar:scan` script does not (so `scan` is fire-and-forget for
# inspection runs that shouldn't fail CI on a cosmetic regression).
# Default OFF here ΓÇö scripts pass `-Dsonar.qualitygate.wait=true` when
# they need the gate.
sonar.qualitygate.wait=false
